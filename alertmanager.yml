global:
  resolve_timeout: 5m

route:
  group_by: ["alertname"]
  group_wait: 10s
  group_interval: 10s
  repeat_interval: 1h
  receiver: "superbizagent"

receivers:
  - name: "superbizagent"
    webhook_configs:
      - url: "http://superbizagent:9900/api/ai_ops/webhook"
        send_resolved: false
